<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Speed Test</title>
<link rel="stylesheet" href="19thday.css">
</head>
<body>

<div class="container">

<h1>Typing Speed Test</h1>

<div class="text-box" id="paragraph">
The quick brown fox jumps over the lazy dog. Practice typing every day to improve your typing speed and accuracy. Keep your fingers on the correct keys and avoid looking at the keyboard while typing.
</div>

<textarea
id="input"
placeholder="Start typing here..."
></textarea>

<div class="details">

<div class="box">
<h2 id="timer">60</h2>
<p>Seconds</p>
</div>

<div class="box">
<h2 id="wpm">0</h2>
<p>WPM</p>
</div>

<div class="box">
<h2 id="accuracy">100%</h2>
<p>Accuracy</p>
</div>

</div>

<button id="restart">Restart Test</button>

</div>

<script src="19thday.js"></script>

</body>
</html>
