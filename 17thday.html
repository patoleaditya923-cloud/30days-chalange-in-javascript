<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            margin: 10px 0;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin: 15px 0;
            border: 2px solid #4facfe;
            border-radius: 6px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            background: #4facfe;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #008cff;
        }

        #message {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
        }

        #attempts {
            margin-top: 10px;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 Guess the Number</h1>
    <p>Guess a number between <b>1 and 100</b></p>

    <input type="number" id="guessInput" placeholder="Enter your guess">

    <button onclick="checkGuess()">Guess</button>
    <button onclick="restartGame()">Restart</button>

    <p id="message"></p>
    <p id="attempts">Attempts: 0</p>
</div>

<script src="17thday.js"></script>

</body>
</html>
